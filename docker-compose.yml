version: '3.8'

services:
  weather-api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: weather-tracker-api
    ports:
      - "5000:5000"
    environment:
      - FLASK_ENV=development
      - FLASK_APP=main.py
    restart: unless-stopped
    volumes:
      # Mount cache directory for weather data
      - weather-cache:/app/.cache
    networks:
      - weather-network

volumes:
  weather-cache:
    driver: local

networks:
  weather-network:
    driver: bridge
